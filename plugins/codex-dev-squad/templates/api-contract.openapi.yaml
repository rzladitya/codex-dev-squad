openapi: 3.1.0
info:
  title: Codex Feature API Contract
  version: 0.1.0
paths:
  /api/example:
    get:
      summary: Replace with feature endpoint summary
      operationId: getExample
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExampleResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ExampleResponse:
      type: object
      required:
        - id
      properties:
        id:
          type: string

